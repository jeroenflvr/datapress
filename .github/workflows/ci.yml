name: CI

# Lint + test the Rust workspace on every push to main and every pull
# request. The PyPI publish workflow (publish.yml) is independent and
# only runs on version tags.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-clippy
      - uses: astral-sh/setup-uv@v7
      - name: Build MkDocs site
        run: uv tool run --with 'mkdocs>=1.6,<2' --with 'mkdocs-material>=9.6,<10' mkdocs build -f docs/mkdocs.yml -d site --strict
      - run: cargo clippy --workspace --all-targets --features docs,swagger --locked

  test:
    name: cargo test
    runs-on: ubuntu-latest
    # Strip debuginfo from the test profile. The duckdb-sys static archive
    # is huge and pulling it in *with* debug symbols regularly OOMs
    # rust-lld on the 7 GB ubuntu-latest runner (manifests as
    # `ld terminated with signal 7 [Bus error]`).
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_PROFILE_DEV_DEBUG:  "0"
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache:         true
          android:            true
          dotnet:             true
          haskell:            true
          large-packages:     false
          docker-images:      true
          swap-storage:       false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test
      - uses: astral-sh/setup-uv@v7
      - name: Build MkDocs site
        run: uv tool run --with 'mkdocs>=1.6,<2' --with 'mkdocs-material>=9.6,<10' mkdocs build -f docs/mkdocs.yml -d site --strict
      - run: cargo test --workspace --features docs,swagger --locked

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Scan Cargo.lock for crates with known RUSTSEC advisories.
      # Fails the build on any vulnerability (unmaintained-crate warnings
      # do not fail the build).
      - run: cargo audit

