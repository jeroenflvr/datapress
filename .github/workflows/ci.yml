name: CI

# Lint + test the Rust workspace on every push to main and every pull
# request. The PyPI publish workflow (publish.yml) is independent and
# only runs on version tags.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-clippy
      - uses: astral-sh/setup-uv@v3
      - name: Build MkDocs site
        run: uv tool run --with mkdocs-material mkdocs build -f docs/mkdocs.yml -d site --strict
      - run: cargo clippy --workspace --all-targets --features docs,swagger --locked

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test
      - uses: astral-sh/setup-uv@v3
      - name: Build MkDocs site
        run: uv tool run --with mkdocs-material mkdocs build -f docs/mkdocs.yml -d site --strict
      - run: cargo test --workspace --features docs,swagger --locked
