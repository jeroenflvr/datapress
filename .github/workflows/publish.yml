name: Publish datapress to PyPI

# Build wheels only on `v*` tags (which then publish to PyPI) and on
# manual dispatch. Branch pushes and PRs no longer trigger a build.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Linux: build wheels for x86_64 (zig cross) and aarch64 (native runner).
  # -----------------------------------------------------------------------
  linux:
    name: wheels-linux-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            runner: ubuntu-latest
          - target: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheels-linux-${{ matrix.target }}
      - uses: PyO3/maturin-action@v1
        with:
          target:         ${{ matrix.target }}
          manylinux:      auto
          args:           --release --out dist
          rust-toolchain: stable
          # DuckDB refuses to build under the legacy GCC C++ ABI
          # (_GLIBCXX_USE_CXX11_ABI=0) which the manylinux cross-build
          # images set by default. The actual guard in
          # duckdb/common/platform.hpp checks _GLIBCXX_USE_CXX11_ABI==0,
          # NOT the DUCKDB_EXPLICIT_PLATFORM macro that the error
          # message misleadingly suggests. manylinux2014 ships GCC 10,
          # so the CXX11 ABI is fully supported — just flip the flag.
          before-script-linux: |
            export CXXFLAGS="-D_GLIBCXX_USE_CXX11_ABI=1 ${CXXFLAGS:-}"
            echo "CXXFLAGS=${CXXFLAGS}"
          # sccache disabled: wrapping `c++` inside the manylinux container
          # makes the bundled duckdb-sys C++ build fail silently. The
          # Swatinem/rust-cache step above already caches target/ between
          # runs, which covers the same C++ object files.
          sccache:        'false'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # -----------------------------------------------------------------------
  # macOS: arm64 only.
  # -----------------------------------------------------------------------
  macos:
    name: wheels-macos-aarch64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheels-macos-aarch64
      - uses: PyO3/maturin-action@v1
        with:
          target:         aarch64
          args:           --release --out dist
          rust-toolchain: stable
          sccache:        'false'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: dist

  # -----------------------------------------------------------------------
  # Source distribution
  # -----------------------------------------------------------------------
  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args:    --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # -----------------------------------------------------------------------
  # Publish: runs only on `v*` tag push.
  # Auth: classic PyPI API token stored in repo secret PYPI_API_TOKEN.
  #   Create at https://pypi.org/manage/account/token/ and add it under
  #   GitHub → Settings → Secrets and variables → Actions → New secret.
  # -----------------------------------------------------------------------
  publish:
    name: publish-to-pypi
    needs: [linux, macos, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path:    dist
          pattern: 'wheels-*'
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
