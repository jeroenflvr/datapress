name: Publish datapress (PyPI + crates.io + GitHub Release)

# Build wheels only on `v*` tags (which then publish to PyPI, crates.io,
# and attach standalone CLI binaries to the GitHub Release) and on manual
# dispatch. Branch pushes and PRs no longer trigger a build.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Linux: build wheels for x86_64 (zig cross) and aarch64 (native runner).
  # -----------------------------------------------------------------------
  linux:
    name: wheels-linux-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            runner: ubuntu-latest
          - target: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - uses: astral-sh/setup-uv@v7
      - name: Build MkDocs site
        run: uv tool run --with 'mkdocs>=1.6,<2' --with 'mkdocs-material>=9.6,<10' mkdocs build -f docs/mkdocs.yml -d site --strict
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheels-linux-${{ matrix.target }}
      - uses: PyO3/maturin-action@v1
        with:
          target:         ${{ matrix.target }}
          manylinux:      auto
          args:           --release --features docs,swagger,auth,metrics,explorer --out dist
          rust-toolchain: stable
          # The rust-cross manylinux2014 images ship GCC 4.8 (CentOS 7
          # base), which trips DuckDB's `__GNUC__ < 5` ABI guard in
          # platform.hpp regardless of _GLIBCXX_USE_CXX11_ABI. The only
          # source-level bypass is defining DUCKDB_CUSTOM_PLATFORM,
          # which makes DuckDBPlatform() early-return before the
          # #error. The error message's "DUCKDB_EXPLICIT_PLATFORM"
          # hint is a lie — that macro is only honored by upstream
          # Makefile/CMake, not the bundled cc-rs build.
          before-script-linux: |
            case "${{ matrix.target }}" in
              x86_64)  PLATFORM=linux_amd64_gcc4 ;;
              aarch64) PLATFORM=linux_arm64_gcc4 ;;
              *)       echo "Unknown target ${{ matrix.target }}"; exit 1 ;;
            esac
            export CXXFLAGS="-DDUCKDB_CUSTOM_PLATFORM=${PLATFORM} ${CXXFLAGS:-}"
            echo "CXXFLAGS=${CXXFLAGS}"
          # sccache disabled: wrapping `c++` inside the manylinux container
          # makes the bundled duckdb-sys C++ build fail silently. The
          # Swatinem/rust-cache step above already caches target/ between
          # runs, which covers the same C++ object files.
          sccache:        'false'
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # -----------------------------------------------------------------------
  # macOS: arm64 only.
  # -----------------------------------------------------------------------
  macos:
    name: wheels-macos-aarch64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - uses: astral-sh/setup-uv@v7
      - name: Build MkDocs site
        run: uv tool run --with 'mkdocs>=1.6,<2' --with 'mkdocs-material>=9.6,<10' mkdocs build -f docs/mkdocs.yml -d site --strict
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheels-macos-aarch64
      - uses: PyO3/maturin-action@v1
        with:
          target:         aarch64
          args:           --release --features docs,swagger,auth,metrics,explorer --out dist
          rust-toolchain: stable
          sccache:        'false'
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-aarch64
          path: dist

  # -----------------------------------------------------------------------
  # Windows: x86_64 only (aarch64 needs a non-trivial duckdb cross build).
  # -----------------------------------------------------------------------
  windows:
    name: wheels-windows-x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - uses: astral-sh/setup-uv@v7
      - name: Build MkDocs site
        run: uv tool run --with 'mkdocs>=1.6,<2' --with 'mkdocs-material>=9.6,<10' mkdocs build -f docs/mkdocs.yml -d site --strict
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheels-windows-x64
      - uses: PyO3/maturin-action@v1
        with:
          target:         x64
          args:           --release --features docs,swagger,auth,metrics,explorer --out dist
          rust-toolchain: stable
          sccache:        'false'
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-x64
          path: dist

  # -----------------------------------------------------------------------
  # Source distribution
  # -----------------------------------------------------------------------
  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args:    --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  # -----------------------------------------------------------------------
  # Publish: runs only on `v*` tag push.
  # Auth: classic PyPI API token stored in repo secret PYPI_API_TOKEN.
  #   Create at https://pypi.org/manage/account/token/ and add it under
  #   GitHub → Settings → Secrets and variables → Actions → New secret.
  # -----------------------------------------------------------------------
  publish:
    name: publish-to-pypi
    needs: [linux, macos, windows, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path:    dist
          pattern: 'wheels-*'
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}

  # -----------------------------------------------------------------------
  # Publish the Rust crates to crates.io (so `cargo install datapress`
  # works). Runs only on `v*` tag push. Crates must be published
  # bottom-up: each one's path deps carry a `version`, which `cargo
  # publish` rewrites to a registry dep, so every dependency must already
  # exist on crates.io before the crate that needs it.
  #
  # Auth: crates.io API token stored in repo secret CARGO_REGISTRY_TOKEN.
  #   Create at https://crates.io/settings/tokens and add it under
  #   GitHub → Settings → Secrets and variables → Actions → New secret.
  #
  # `cargo publish` (>=1.66) waits for each crate to be visible in the
  # registry index before returning, so the next publish can resolve it.
  # -----------------------------------------------------------------------
  crates-io:
    name: publish-to-crates-io
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # Free as much disk space as possible before the bundled DuckDB
      # amalgamation build. The libduckdb.a archive alone is ~1.5 GB and
      # the standard ubuntu-latest runner only has ~14 GB total — other
      # pre-installed tooling easily fills the remainder.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af || true
          df -h
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: publish-crates-io
      # DuckDB's bundled C++ build trips its `__GNUC__ < 5` ABI guard on
      # some toolchains; mirror the wheel build's bypass so the verify
      # step (a full compile) succeeds.
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for crate in datapress-core datapress-duckdb datapress-datafusion datapress; do
            echo "::group::cargo publish -p ${crate}"
            # datapress-duckdb bundles the full DuckDB C++ amalgamation
            # (~1.5 GB debug build). Skip --verify for it: the wheel CI
            # jobs already prove it compiles on every target platform.
            if [ "${crate}" = "datapress-duckdb" ]; then
              cargo publish -p "${crate}" --locked --no-verify
            else
              cargo publish -p "${crate}" --locked
            fi
            echo "::endgroup::"
          done

  # -----------------------------------------------------------------------
  # Standalone `datapress` CLI binaries. Build the unified binary (both
  # backends bundled) for each supported target and upload each as a
  # workflow artifact. The `github-release` job below collects them and
  # attaches them to the GitHub Release for the tag.
  #
  # Each target builds natively on a matching runner (no cross-compiling),
  # so DuckDB's bundled C++ build uses a modern GCC/Clang and needs no ABI
  # workaround. The MkDocs site is built first so the `docs` feature can
  # embed it (mirrors the wheel jobs).
  # -----------------------------------------------------------------------
  cli:
    name: cli-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - uses: astral-sh/setup-uv@v7
      - name: Build MkDocs site
        run: uv tool run --with 'mkdocs>=1.6,<2' --with 'mkdocs-material>=9.6,<10' mkdocs build -f docs/mkdocs.yml -d site --strict
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cli-${{ matrix.target }}
      - name: Build datapress CLI
        run: cargo build --release -p datapress --bin datapress --features docs,swagger,auth,metrics,explorer --target ${{ matrix.target }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          archive="datapress-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "${archive}" -C "target/${{ matrix.target }}/release" datapress
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi
          echo "ASSET=${archive}" >> "${GITHUB_ENV}"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "datapress-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/datapress.exe" -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ascii -NoNewline "$archive.sha256"
          "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append
      - uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  # -----------------------------------------------------------------------
  # Attach the CLI binaries to the GitHub Release for the tag. Runs only
  # on `v*` tag push, after all CLI builds succeed. `contents: write` is
  # required to create/update the release and upload assets.
  # -----------------------------------------------------------------------
  github-release:
    name: github-release
    needs: [cli]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path:    cli-dist
          pattern: 'cli-*'
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            cli-dist/*
            install.sh
            install.ps1
          fail_on_unmatched_files: true
          generate_release_notes: true

  # -----------------------------------------------------------------------
  # Bump the Homebrew tap formula on each release.
  #
  # Runs automatically on every `v*` tag once the HOMEBREW_TAP_TOKEN secret
  # is configured (a PAT with `contents:write` on your `homebrew-tap` repo).
  # If the secret is absent the job logs a warning and skips, so releases
  # never fail just because the tap isn't set up yet. See packaging/README.md.
  # -----------------------------------------------------------------------
  update-homebrew:
    name: update-homebrew-tap
    needs: [github-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - name: Skip when token missing
        if: env.HAS_TOKEN != 'true'
        run: echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping Homebrew tap update."
      - uses: actions/checkout@v6
        if: env.HAS_TOKEN == 'true'
      - name: Check out the tap
        if: env.HAS_TOKEN == 'true'
        uses: actions/checkout@v6
        with:
          repository: jeroenflvr/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Regenerate formula
        if: env.HAS_TOKEN == 'true'
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p tap/Formula
          sh packaging/homebrew/update-formula.sh "${version}" tap/Formula/datapress.rb
      - name: Commit and push
        if: env.HAS_TOKEN == 'true'
        working-directory: tap
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/datapress.rb
          # Use the *staged* diff so a brand-new (untracked) formula on the
          # first run is detected too — `git diff --quiet` alone ignores
          # untracked files and would skip the initial bootstrap commit.
          if git diff --cached --quiet; then
            echo "No formula changes."
            exit 0
          fi
          git commit -m "datapress ${GITHUB_REF_NAME#v}"
          git push

  # -----------------------------------------------------------------------
  # Submit the new version to winget (microsoft/winget-pkgs).
  #
  # Runs automatically on every `v*` tag once the WINGET_TOKEN secret is
  # configured (a classic PAT with `public_repo` that can push to your fork
  # of winget-pkgs). If the secret is absent the job logs a warning and
  # skips. See packaging/README.md.
  #
  # NOTE: winget-releaser only *updates* existing packages. The very first
  # version of datap-rs.DataPress must be submitted manually once (see the
  # "First-time bootstrap" section in packaging/README.md). Until that PR is
  # merged this job fails with "Package ... does not exist".
  #
  # To avoid red CI runs in the meantime, the job is gated on the repo
  # variable WINGET_BOOTSTRAPPED. Leave it unset (or anything other than
  # "true") until the bootstrap PR is merged, then set it once:
  #   Settings → Secrets and variables → Actions → Variables →
  #   New repository variable → WINGET_BOOTSTRAPPED = true
  # -----------------------------------------------------------------------
  update-winget:
    name: update-winget
    needs: [github-release]
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      vars.WINGET_BOOTSTRAPPED == 'true'
    runs-on: windows-latest
    env:
      HAS_TOKEN: ${{ secrets.WINGET_TOKEN != '' }}
    steps:
      - name: Skip when token missing
        if: env.HAS_TOKEN != 'true'
        shell: bash
        run: echo "::warning::WINGET_TOKEN not set — skipping winget submission."
      - name: Submit to winget-pkgs
        if: env.HAS_TOKEN == 'true'
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: datap-rs.DataPress
          installers-regex: '-x86_64-pc-windows-msvc\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}

