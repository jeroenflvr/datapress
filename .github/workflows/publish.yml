name: Publish datapress to PyPI

# Build wheels on every push to main (smoke test), and on every `v*` tag.
# Only tag builds upload to PyPI.
on:
  push:
    branches: [main, feat/multi-backend]
    tags:     ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Linux: build manylinux + musllinux wheels for x86_64 and aarch64
  # -----------------------------------------------------------------------
  linux:
    name: wheels-linux-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: PyO3/maturin-action@v1
        with:
          target:        ${{ matrix.target }}
          manylinux:     auto
          args:          --release --out dist --zig
          rust-toolchain: stable
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # -----------------------------------------------------------------------
  # macOS: universal2 wheel covers both arm64 and x86_64
  # -----------------------------------------------------------------------
  macos:
    name: wheels-macos-${{ matrix.target }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: PyO3/maturin-action@v1
        with:
          target:        ${{ matrix.target }}
          args:          --release --out dist
          rust-toolchain: stable
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  # -----------------------------------------------------------------------
  # Windows: x86_64 only (aarch64 needs a non-trivial duckdb cross build)
  # -----------------------------------------------------------------------
  windows:
    name: wheels-windows-x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: PyO3/maturin-action@v1
        with:
          target:        x64
          args:          --release --out dist
          rust-toolchain: stable
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist

  # -----------------------------------------------------------------------
  # Source distribution
  # -----------------------------------------------------------------------
  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args:    --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # -----------------------------------------------------------------------
  # Publish: runs only on `v*` tag push.
  # Auth: classic PyPI API token stored in repo secret PYPI_API_TOKEN.
  #   Create at https://pypi.org/manage/account/token/ and add it under
  #   GitHub → Settings → Secrets and variables → Actions → New secret.
  # -----------------------------------------------------------------------
  publish:
    name: publish-to-pypi
    needs: [linux, macos, windows, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path:    dist
          pattern: 'wheels-*'
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
