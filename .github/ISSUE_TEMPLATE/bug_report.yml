name: Bug report
description: Report a reproducible problem in datapress
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please include enough detail for maintainers to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands, config snippets, requests, and sample data shape where possible.
      placeholder: |
        1. Configure dataset ...
        2. Run ...
        3. Request ...
        4. See ...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - datapress-core / HTTP API
        - DuckDB backend
        - DataFusion backend
        - Python package
        - Documentation
        - CI / release
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Release version, wheel version, or git commit SHA.
      placeholder: "0.2.3"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, Python version, backend, dataset format, and relevant config.
      placeholder: |
        OS:
        rustc:
        Python:
        Backend:
        Dataset format:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: text
