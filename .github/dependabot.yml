# Dependabot keeps dependencies current and surfaces security advisories.
# Referenced from SECURITY.md. Grouped updates keep PR noise down.
version: 2
updates:
  # Rust workspace (Cargo.lock at the repo root).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      rust-dependencies:
        patterns:
          - "*"

  # GitHub Actions used by the CI and publish workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  # Python tooling for the wheel / docs (pyproject.toml).
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"
