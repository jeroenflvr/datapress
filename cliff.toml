# git-cliff configuration — generates CHANGELOG.md from Conventional Commits.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.
Format based on [Keep a Changelog](https://keepachangelog.com/),
versioning follows [SemVer](https://semver.org/).
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}\
{% if commit.breaking %} **[BREAKING]**{% endif %} \
([{{ commit.id | truncate(length=7, end="") }}](https://github.com/jeroenflvr/fast-api/commit/{{ commit.id }}))
{%- endfor %}
{% endfor %}\n
"""
footer = ""
trim   = true

[git]
conventional_commits  = true
filter_unconventional = false
split_commits         = false
protect_breaking_commits = false
filter_commits        = false
tag_pattern           = "v[0-9]*"
topo_order            = false
sort_commits          = "newest"

commit_parsers = [
    { message = "^feat",                 group = "Features"             },
    { message = "^fix",                  group = "Bug Fixes"            },
    { message = "^perf",                 group = "Performance"          },
    { message = "^refactor",             group = "Refactor"             },
    { message = "^doc",                  group = "Documentation"        },
    { message = "^test",                 group = "Tests"                },
    { message = "^build",                group = "Build System"         },
    { message = "^ci",                   group = "CI"                   },
    { message = "^chore\\(release\\):",  skip   = true                  },
    { message = "^chore",                group = "Miscellaneous"        },
    { message = "^style",                group = "Styling"              },
    { message = "^revert",               group = "Revert"               },
    { body    = ".*security",            group = "Security"             },
]

commit_preprocessors = [
    # Strip trailing whitespace from commit subjects.
    { pattern = '\s+$', replace = "" },
]
