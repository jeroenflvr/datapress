# ---------------------------------------------------------------------------
# Dataset registry for fast-api.
#
# Every running instance reads this file at startup and registers each entry
# as a queryable table at `POST /api/datasets/{name}/query`.
#
# Fields per dataset:
#   name    - unique identifier, used in the URL path
#   source  - path to a single .parquet file, or a directory containing
#             one or more *.parquet files (no glob patterns)
#
# Optional `[dataset.index]` block (DataFusion backend only — ignored by
# DuckDB, which has its own native indexing):
#   mode             - "auto" (default): index every column whose distinct
#                                        count stays under max_cardinality
#                      "none":           never build an equality index
#                      "list":           only index columns listed below
#   columns          - column names, required when mode = "list"
#   max_cardinality  - skip a column once it exceeds this many distinct
#                      values (default 100_000)
# ---------------------------------------------------------------------------

[[dataset]]
name   = "accidents"
source = "data/accidents.parquet"

# Default index policy (mode = "auto") — every low-cardinality column
# gets indexed. To pin a specific set, uncomment and adjust:
#
# [dataset.index]
# mode    = "list"
# columns = ["State", "Severity", "City", "County", "Source",
#            "Sunrise_Sunset", "Junction", "Traffic_Signal"]
