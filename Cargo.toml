[workspace]
resolver = "3"
members  = [
    "crates/core",
    "crates/duckdb",
    "crates/datafusion",
    "crates/python",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
# Internal crates (path deps).
datapress-core       = { path = "crates/core" }
datapress-duckdb     = { path = "crates/duckdb" }
datapress-datafusion = { path = "crates/datafusion" }

# Shared third-party deps. Pinning versions here keeps every crate aligned.
actix-web  = { version = "4.12.1", features = ["compress-gzip", "compress-brotli", "compress-zstd"] }
tokio      = { version = "1.52.2", features = ["full"] }
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
env_logger = "0.11"
log        = "0.4"
toml       = "0.8"

arrow      = "58"
parquet    = { version = "58", features = ["arrow"] }
datafusion = "53"
duckdb     = { version = "1.10503.0", features = ["bundled"] }
rayon      = "1"
itoa       = "1"
ryu        = "1"
arc-swap   = "1"
object_store = { version = "0.13", features = ["aws"] }
url          = "2"
deltalake    = { version = "0.32", features = ["datafusion", "s3"] }

pyo3                = { version = "0.27", features = ["extension-module", "abi3-py39"] }
pyo3-async-runtimes = { version = "0.27", features = ["tokio-runtime"] }

[profile.release]
opt-level     = 3
lto           = true
codegen-units = 1
