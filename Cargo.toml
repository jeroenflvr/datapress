[package]
name = "fast-api"
version = "0.1.0"
edition = "2024"

[dependencies]
actix-web = "4.12.1"
duckdb = { version = "1.10503.0", features = ["bundled"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.52.2", features = ["full"] }
env_logger = "0.11.9"
log = "0.4.28"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
