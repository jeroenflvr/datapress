<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuckDB Shell</title>

  <!-- Bootstrap -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <!-- xterm (DuckDB shell terminal) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />

  <!-- htmx -->
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>

  <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}" />
</head>
<body class="bg-body">
  <nav class="navbar navbar-expand bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-terminal"></i> DuckDB Shell
      </span>
      <span id="engine-badge" class="badge text-bg-secondary ms-auto">loading engine…</span>
    </div>
  </nav>

  <main class="container-fluid py-3">
    <div class="row g-3">
      <!-- Shell -->
      <div class="col-12 col-lg-8">
        <div class="card h-100">
          <div class="card-header d-flex align-items-center justify-content-between">
            <span>Terminal</span>
            <small class="text-secondary">@duckdb/duckdb-wasm@{{ duckdb_version }}</small>
          </div>
          <div class="card-body p-0 position-relative">
            <div id="boot" class="d-flex align-items-center justify-content-center text-secondary p-4">
              loading duckdb&hellip;
            </div>
            <div id="shell"></div>
          </div>
        </div>
      </div>

      <!-- Server panel -->
      <div class="col-12 col-lg-4">
        <div class="card h-100">
          <div class="card-header">DataPress server</div>
          <div class="card-body">
            <form
              hx-post="/datasets"
              hx-target="#datasets"
              hx-swap="innerHTML"
              hx-indicator="#datasets-spinner"
            >
              <label for="server_url" class="form-label">Server URL</label>
              <div class="input-group mb-3">
                <input
                  type="url"
                  class="form-control"
                  id="server_url"
                  name="server_url"
                  value="{{ default_server_url }}"
                  placeholder="http://localhost:8080"
                  required
                />
                <button class="btn btn-primary" type="submit">
                  <span
                    id="datasets-spinner"
                    class="htmx-indicator spinner-border spinner-border-sm"
                    role="status"
                  ></span>
                  Load
                </button>
              </div>
            </form>
            <div id="datasets" class="small text-secondary">
              Enter a server URL and click <strong>Load</strong> to list datasets.
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div
    id="toast"
    class="toast-container position-fixed bottom-0 start-0 p-3"
    style="z-index: 1080"
  ></div>

  <script type="module">
    window.__DUCKDB_CONFIG__ = {
      version: {{ duckdb_version | tojson }},
      runQuack: {{ run_quack | tojson }},
    };
  </script>
  <script type="module" src="{{ url_for('static', path='shell.js') }}"></script>
</body>
</html>
