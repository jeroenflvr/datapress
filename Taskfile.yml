version: '3'

# ---------------------------------------------------------------------------
# DataPress workspace — two Rust binaries (one per engine) plus a Python
# wheel (`datapress`) that bundles both engines.
#
#   task build:duckdb        # build the DuckDB Rust binary
#   task build:datafusion    # build the DataFusion Rust binary
#   task build               # build both Rust binaries
#   task run:duckdb          # run the DuckDB binary
#   task run:datafusion      # run the DataFusion binary
#   task check               # cargo check the whole workspace
#   task py:develop          # build + install the Python wheel into the venv
#   task py:build            # build a release wheel
# ---------------------------------------------------------------------------

vars:
  RELEASE: '--release'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:duckdb:
    desc: Build the DuckDB-backed binary (release)
    cmds:
      - cargo build {{.RELEASE}} -p datapress-duckdb --bin datapress-duckdb

  build:datafusion:
    desc: Build the Arrow + DataFusion-backed binary (release)
    cmds:
      - cargo build {{.RELEASE}} -p datapress-datafusion --bin datapress-datafusion

  build:
    desc: Build both Rust binaries
    deps: [build:duckdb, build:datafusion]

  run:duckdb:
    desc: Run the DuckDB binary (release)
    deps: [build:duckdb]
    cmds:
      - RUST_LOG=info ./target/release/datapress-duckdb

  run:datafusion:
    desc: Run the DataFusion binary (release)
    deps: [build:datafusion]
    cmds:
      - RUST_LOG=info ./target/release/datapress-datafusion

  check:
    desc: Type-check the entire workspace (all crates, all targets)
    cmds:
      - cargo check --workspace --all-targets

  check:duckdb:
    cmds:
      - cargo check -p datapress-duckdb

  check:datafusion:
    cmds:
      - cargo check -p datapress-datafusion

  fmt:
    cmds:
      - cargo fmt --all

  clean:
    cmds:
      - cargo clean

  py:develop:
    desc: Build the `datapress` wheel in dev mode and install into ./.venv
    cmds:
      - uv venv --allow-existing
      - uv tool run --with maturin maturin develop --release --uv

  py:build:
    desc: Build a release wheel into ./target/wheels/
    cmds:
      - uv tool run --with maturin maturin build --release
