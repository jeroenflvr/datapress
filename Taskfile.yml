version: '3'

# ---------------------------------------------------------------------------
# DataPress workspace — two Rust binaries (one per engine) plus a Python
# wheel (`datapress`) that bundles both engines.
#
#   task build:duckdb        # build the DuckDB Rust binary
#   task build:datafusion    # build the DataFusion Rust binary
#   task build               # build both Rust binaries
#   task run:duckdb          # run the DuckDB binary
#   task run:datafusion      # run the DataFusion binary
#   task check               # cargo check the whole workspace
#   task py:develop          # build + install the Python wheel into the venv
#   task py:build            # build a release wheel
# ---------------------------------------------------------------------------

vars:
  RELEASE: '--release'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:duckdb:
    desc: Build the DuckDB-backed binary (release)
    cmds:
      - cargo build {{.RELEASE}} -p datapress-duckdb --bin datapress-duckdb

  build:datafusion:
    desc: Build the Arrow + DataFusion-backed binary (release)
    cmds:
      - cargo build {{.RELEASE}} -p datapress-datafusion --bin datapress-datafusion

  build:cli:
    desc: Build the unified `datapress` CLI (both backends bundled, release)
    deps: [docs:build]
    cmds:
      - cargo build {{.RELEASE}} -p datapress --bin datapress --features docs,swagger,auth,metrics,explorer

  build:
    desc: Build both Rust binaries
    deps: [build:duckdb, build:datafusion]

  run:duckdb:
    desc: Run the DuckDB binary (release, with embedded docs site + swagger UI)
    deps: [docs:build]
    cmds:
      - cargo build {{.RELEASE}} -p datapress-duckdb --bin datapress-duckdb --features docs,swagger,metrics,explorer
      - RUST_LOG=info ./target/release/datapress-duckdb

  run:datafusion:
    desc: Run the DataFusion binary (release, with embedded docs site + swagger UI)
    deps: [docs:build]
    cmds:
      - cargo build {{.RELEASE}} -p datapress-datafusion --bin datapress-datafusion --features docs,swagger,metrics,explorer
      - RUST_LOG=info ./target/release/datapress-datafusion

  check:
    desc: Type-check the entire workspace (all crates, all targets)
    cmds:
      - cargo check --workspace --all-targets

  check:duckdb:
    cmds:
      - cargo check -p datapress-duckdb

  check:datafusion:
    cmds:
      - cargo check -p datapress-datafusion

  fmt:
    cmds:
      - cargo fmt --all

  clean:
    cmds:
      - cargo clean

  py:develop:
    desc: Build the `datapress` wheel in dev mode and install into ./.venv with the published feature set
    deps: [docs:build]
    cmds:
      - uv venv --allow-existing
      - uv tool run --with maturin maturin develop --release --uv --features docs,swagger,auth,metrics,explorer

  py:build:
    desc: Build a release wheel into ./target/wheels/ with the published feature set
    deps: [docs:build]
    cmds:
      - uv tool run --with maturin maturin build --release --features docs,swagger,auth,metrics,explorer

  # ---------------------------------------------------------------------
  # Documentation (MkDocs + Material)
  # ---------------------------------------------------------------------
  docs:build:
    desc: Build the embedded MkDocs site into docs/site/
    cmds:
      - uv tool run --with 'mkdocs>=1.6,<2' --with 'mkdocs-material>=9.6,<10' mkdocs build -f docs/mkdocs.yml -d site --strict

  docs:serve:
    desc: Live-reload MkDocs site at http://127.0.0.1:8001
    cmds:
      - uv tool run --with 'mkdocs>=1.6,<2' --with 'mkdocs-material>=9.6,<10' mkdocs serve -f docs/mkdocs.yml --dev-addr 127.0.0.1:8001

  docs:vendor-duckdb:
    desc: >-
      Sync self-hosted DuckDB-WASM assets from docs/external into
      docs/src/assets/vendor/duckdb: copy the wasm + worker binaries and bundle
      the ESM glue (apache-arrow MUST be 17.0.0). Run after a fresh external
      build drops new files into docs/external.
    cmds:
      - |
        set -e
        REPO="$PWD"
        EXT="$REPO/docs/external"
        OUT="$REPO/docs/src/assets/vendor/duckdb"
        mkdir -p "$OUT"

        # 1. Copy the self-contained wasm binaries + worker scripts verbatim.
        cp -v \
          "$EXT/duckdb-eh.wasm" \
          "$EXT/duckdb-mvp.wasm" \
          "$EXT/shell_bg.wasm" \
          "$EXT/duckdb-browser-eh.worker.js" \
          "$EXT/duckdb-browser-mvp.worker.js" \
          "$OUT/"

        # 2. Bundle the ESM glue (inlines apache-arrow 17 + xterm) into
        #    self-contained browser modules.
        BUILD=$(mktemp -d)
        trap 'rm -rf "$BUILD"' EXIT
        cd "$BUILD"
        npm init -y >/dev/null 2>&1
        npm install --no-audit --no-fund \
          esbuild apache-arrow@17.0.0 xterm@5.3.0 \
          xterm-addon-fit@0.8.0 xterm-addon-web-links@0.9.0 xterm-addon-webgl@0.16.0
        DUCKDB_BUNDLE_NM="$BUILD/node_modules" \
          node "$REPO/docs/scripts/bundle-duckdb.mjs"

  # ---------------------------------------------------------------------
  # Changelog (git-cliff)
  # ---------------------------------------------------------------------
  changelog:
    desc: Regenerate CHANGELOG.md from the full git history
    cmds:
      - uv tool run --from git-cliff git-cliff --config cliff.toml --output CHANGELOG.md

  changelog:unreleased:
    desc: Preview unreleased changes (since the last tag) on stdout
    cmds:
      - uv tool run --from git-cliff git-cliff --config cliff.toml --unreleased

  changelog:release:
    desc: "Bump CHANGELOG for a new tag. Usage: task changelog:release -- v0.2.0"
    cmds:
      - uv tool run --from git-cliff git-cliff --config cliff.toml --tag {{.CLI_ARGS}} --output CHANGELOG.md

  # ---------------------------------------------------------------------
  # Release: stamp CHANGELOG, commit, tag, push.
  # Usage:  task release -- v0.2.0
  #
  # Pushing the `v*` tag triggers .github/workflows/publish.yml, which:
  #   - builds + publishes the Python wheel to PyPI,
  #   - publishes the Rust crates to crates.io (`cargo install datapress`),
  #   - builds the standalone `datapress` CLI for linux amd64/arm64,
  #     macOS arm64, and Windows amd64 and attaches them to the GitHub
  #     Release for the tag,
  #   - updates the Homebrew tap formula (when HOMEBREW_TAP_TOKEN is set),
  #   - submits the new version to winget (when WINGET_TOKEN is set).
  #
  # The Homebrew/winget steps need the release archives + checksums, which
  # only exist after CI builds them — so they run in CI on the pushed tag,
  # not locally. Configure the two token secrets once (see packaging/README.md)
  # and every `task release` updates both package managers automatically.
  # ---------------------------------------------------------------------
  release:
    desc: "Cut a release: bump version, update CHANGELOG, commit, tag, push (triggers PyPI + crates.io + GitHub Release CLI builds). Usage: task release -- v0.2.0"
    vars:
      VERSION: '{{.CLI_ARGS}}'
      # Strip leading "v" for Cargo.toml (Cargo wants 0.2.0, git tag wants v0.2.0).
      BARE_VERSION:
        sh: printf '%s' '{{.CLI_ARGS}}' | sed 's/^v//'
    preconditions:
      - sh: 'test -n "{{.VERSION}}"'
        msg: "Missing version. Usage: task release -- v0.2.0"
      - sh: '[[ "{{.VERSION}}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]'
        msg: "Version must look like v1.2.3 (got: {{.VERSION}})"
      - sh: 'test -z "$(git status --porcelain)"'
        msg: "Working tree is dirty — commit or stash changes first."
      - sh: '! git rev-parse "{{.VERSION}}" >/dev/null 2>&1'
        msg: "Tag {{.VERSION}} already exists."
    cmds:
      # 1. Bump workspace version and internal path-dependency constraints.
      - |
        python3 -c "
        import re, pathlib
        p = pathlib.Path('Cargo.toml')
        s = p.read_text()
        new, n = re.subn(r'(?m)^(version\s*=\s*\")[^\"]+(\"\s*(?:#.*)?)$', r'\g<1>{{.BARE_VERSION}}\g<2>', s, count=1)
        assert n == 1, 'workspace version line not found in Cargo.toml'
        for crate in ('core', 'duckdb', 'datafusion'):
            pattern = rf'(path\s*=\s*\"crates/{crate}\",\s*version\s*=\s*\")[^\"]+(\")'
            new, n = re.subn(pattern, rf'\g<1>{{.BARE_VERSION}}\g<2>', new, count=1)
            assert n == 1, f'internal dependency version for crates/{crate} not found in Cargo.toml'
        p.write_text(new)
        "
      # 2. Refresh Cargo.lock with the new version.
      - cargo update --workspace --offline 2>/dev/null || cargo check --workspace --quiet
      # 3. Bump the version shown in the MkDocs header badge.
      - |
        python3 -c "
        import re, pathlib
        p = pathlib.Path('docs/mkdocs.yml')
        s = p.read_text()
        new, n = re.subn(r'(?m)^(\s*datapress_version:\s*).*$', r'\g<1>{{.BARE_VERSION}}', s, count=1)
        assert n == 1, 'datapress_version line not found in docs/mkdocs.yml'
        p.write_text(new)
        "
      # 4. Regenerate CHANGELOG stamped at the new tag.
      - uv tool run --from git-cliff git-cliff --config cliff.toml --tag {{.VERSION}} --output CHANGELOG.md
      # 5. Commit, tag, push.
      - git add Cargo.toml Cargo.lock CHANGELOG.md docs/mkdocs.yml
      - 'git commit -m "chore(release): {{.VERSION}}"'
      - 'git tag -a {{.VERSION}} -m "Release {{.VERSION}}"'
      - git push --follow-tags
